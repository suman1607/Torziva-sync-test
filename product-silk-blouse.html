<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="product">
  <meta property="og:title" content="Elegant Silk Blouse">
  <meta property="og:image" content="https://images.unsplash.com/photo-1485462537746-965f33f7f6a7?w=800">
  <title>Elegant Silk Blouse — StyleHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f9f9f9; }
    header { background: #fff; border-bottom: 1px solid #eee; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 22px; font-weight: 800; }
    nav a { margin-left: 20px; text-decoration: none; color: #555; font-size: 14px; }
    .product { max-width: 1100px; margin: 40px auto; padding: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
    .product img { width: 100%; border-radius: 16px; height: 520px; object-fit: cover; }
    .product-info h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .category { font-size: 13px; color: #999; margin-bottom: 20px; text-transform: uppercase; }
    .price { font-size: 36px; font-weight: 800; color: #7C3AED; margin-bottom: 24px; }
    .description { color: #555; line-height: 1.7; margin-bottom: 32px; }
    .add-btn { width: 100%; padding: 16px; background: #111; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    footer { background: #111; color: #999; text-align: center; padding: 32px; margin-top: 80px; font-size: 14px; }
  </style>

  <script async src="https://app.torziva.site/sdk.js?key=REPLACE_WITH_YOUR_PUBLIC_KEY"></script>

</head>
<body>

  <header>
    <h1>StyleHub</h1>
    <nav><a href="index.html">Home</a></nav>
  </header>

  <div class="product">
    <img
      src="https://images.unsplash.com/photo-1485462537746-965f33f7f6a7?w=800&q=80"
      alt="Elegant Silk Blouse"
      class="main-product-image"
    >
    <div class="product-info">
      <h1 class="product-title">Elegant Silk Blouse</h1>
      <div class="category">Women / Tops / Silk</div>
      <div class="price">$64.99</div>
      <p class="description">
        Luxurious 100% silk blouse with a relaxed elegant drape.
        Features a V-neckline, pearl buttons, and delicate lace trim
        at the cuffs. Perfect for both office and evening wear.
        Dry clean only.
      </p>
      <button class="add-btn">Add to Cart</button>
    </div>
  </div>

  <footer>
    <p>© 2026 StyleHub Test Store</p>
  </footer>

</body>
</html>
